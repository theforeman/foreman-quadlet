---
- name: Set up basic stuff
  become: true
  hosts:
    - quadlet
    - client
  roles:
    - theforeman.forklift.etc_hosts

- name: Set up quadlet demo machine
  hosts:
    - quadlet
  become: true
  pre_tasks:
    - name: Install packages
      ansible.builtin.package:
        name:
          - podman
          - python3-libsemanage
          - python3-requests
          - bash-completion
          - nmap
          - python3-psycopg2
